version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: nit-admin-backend:latest
    container_name: nit-admin-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/nit-admin
      - API_VERSION=v1
      # Note: Set JWT_SECRET and other sensitive variables via environment or an external .env file
    depends_on:
      - mongodb
    volumes:
      - ./logs:/usr/src/app/logs

  mongodb:
    image: mongo:6.0
    container_name: nit-admin-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
